# Render Blueprint — free web service. State lives in Supabase (run
# supabase_schema.sql once), so NO persistent disk is needed and the free plan
# is fine: an external cron (cron-job.org / GitHub Actions) hits
# /cron/followups?key=$CRON_SECRET on a schedule, which also wakes the instance.
#
# Deploy: push this repo to GitHub → Render → New + → Blueprint → pick the repo,
# then fill the secret env vars (sync:false) in the dashboard.
services:
  - type: web
    name: yogher-ops
    runtime: python
    plan: free
    # If you push the PARENT folder instead of the ops folder alone, uncomment:
    # rootDir: ops
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py web --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PYTHONUNBUFFERED
        value: "1"            # so print() output is flushed live to Render logs
      - key: SCHEDULER_ENABLED
        value: "false"          # external cron drives sending on the free plan
      - key: DRY_RUN
        value: "true"           # flip to "false" once you've reviewed previews
      - key: MAX_PER_DAY
        value: "450"
      - key: EMAIL_FROM_NAME
        value: YogHer
      - key: SITE_URL
        value: https://yogher.in
      # ── Secrets: set these in the Render dashboard, not in git ──
      - key: CRON_SECRET
        sync: false             # long random string; used by /cron/followups
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false           # e.g. hello@yogher.in (must be a verified domain in Resend)
      - key: WHATSAPP_COMMUNITY_URL
        sync: false
      - key: SUPPORT_WHATSAPP
        sync: false
