# Render Blueprint for the YogHer Ops admin app + automatic follow-ups.
#
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# point it at the repo. Fill the secret env vars (marked sync:false) in the
# Render dashboard.
#
# IMPORTANT: the scheduler and the "no double-send" guarantee rely on SQLite
# surviving restarts, so this uses a PERSISTENT DISK — which needs a paid plan
# (Starter, ~$7/mo). On the free plan the service also sleeps when idle, so the
# daily scheduler would not fire reliably. Free is fine for a test run only.
services:
  - type: web
    name: yogher-ops
    runtime: python
    plan: starter
    # If you push the PARENT folder instead of the ops folder alone, uncomment:
    # rootDir: ops
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py web --host 0.0.0.0 --port $PORT
    disk:
      name: state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: STATE_DB_PATH
        value: /var/data/state.sqlite3
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: FOLLOWUP_HOUR
        value: "10"
      - key: SCHEDULER_OFFSET_MINUTES
        value: "330"
      - key: DRY_RUN
        value: "true"          # flip to "false" once you've reviewed previews
      - key: MAX_PER_DAY
        value: "450"
      - key: EMAIL_FROM_NAME
        value: YogHer
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SITE_URL
        value: https://yogher.in
      # ── Secrets: set these in the Render dashboard, not in git ──
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WHATSAPP_COMMUNITY_URL
        sync: false
      - key: SUPPORT_WHATSAPP
        sync: false
